#
# DRSource Professional Security Knowledge Base
#
# Structure:
# VULNERABILITY_ID:
#   description: "Detailed explanation of the vulnerability"
#   cwe: "Common Weakness Enumeration ID"
#   severity: "HIGH | MEDIUM | LOW | INFO"
#
#   # --- Language-specific rules ---
#   language_specific:
#     <lang>:
#       regex_patterns:
#         - id: "..."
#           message: "..."
#           pattern: "..."
#       ast_sources: ["method1", "variable1"]
#       ast_sinks: 
#         - "method2" # All args are vulnerable
#         - name: "method3"
#           args: [0] # Only the first argument is vulnerable
#       ast_sanitizers: ["cleanupMethod"]
#

# --- INJECTION CATEGORY ---
SQL_INJECTION:
  description: "Building SQL queries with unvalidated user input."
  cwe: "CWE-89"
  severity: "HIGH"
  language_specific:
    java:
      regex_patterns:
        - id: "JAVA-SQLI-001"
          message: "SQL query is directly concatenated with user input (request.getParameter)."
          pattern: "(?i)(SELECT|INSERT|UPDATE|DELETE)\\s+.*\\s+FROM\\s+.*\\+.*request\\.getParameter"
        - id: "JAVA-SQLI-002"
          message: "Insecure 'Statement.execute' call with string concatenation."
          pattern: "(?i)^\\s*statement\\.execute(Query|Update)?\\s*\\(.*\\+.*\\)"
      ast_sources: ["request.getParameter", "request.getHeader", "request.getCookie", "@RequestParam", "@PathVariable", "@RequestBody"]
      ast_sinks:
        - name: "executeQuery"
          args: [0]
        - name: "executeUpdate"
          args: [0]
        - name: "execute"
          args: [0]
        - name: "prepareCall"
          args: [0]
        - name: "jdbcTemplate.query"
          args: [0]
      ast_sanitizers: ["prepareStatement", "setLong", "setInt", "setBoolean", "StringEscapeUtils.escapeSql"]
    python:
      ast_sources: ["request.args.get", "request.form.get", "request.values.get", "request.json.get", "request.args", "request.form", "self.request.GET", "self.request.POST"]
      ast_sinks:
        - name: "cursor.execute"
          args: [0]
        - name: "session.execute"
          args: [0]
        - name: "db.engine.execute"
          args: [0]
        - name: "RawSQL"
          args: [0]
      ast_sanitizers: ["int", "float", "bool", "django.utils.html.escape"]
    javascript:
      ast_sources: ["req.query", "req.body", "req.params", "req.headers"]
      ast_sinks:
        - name: "db.query"
          args: [0]
        - name: "connection.execute"
          args: [0]
        - name: "sequelize.query"
          args: [0]
        - name: "prisma.$queryRaw"
          args: [0]
        - name: "pg.query"
          args: [0]
      ast_sanitizers: ["escape", "validator.escape", "mysql.escape"]
    php:
      ast_sources: ["$_GET", "$_POST", "$_REQUEST", "$_COOKIE", "readline"]
      ast_sinks:
        - name: "mysqli_query"
          args: [1]
        - name: "mysql_query"
          args: [0]
        - name: "pg_query"
          args: [1]
        - name: "PDO::query"
          args: [0]
        - name: "PDO::exec"
          args: [0]
      ast_sanitizers: ["mysqli_real_escape_string", "pg_escape_string", "addslashes", "htmlspecialchars"]
    ruby:
      ast_sources: ["params", "cookies", "request.env", "gets"]
      ast_sinks:
        - name: "find_by_sql"
          args: [0]
        - name: "execute"
          args: [0]
        - name: "where"
          args: [0]
      ast_sanitizers: ["ActiveRecord::Base.sanitize_sql", "html_escape"]

NOSQL_INJECTION:
  description: "Unsanitized user input in NoSQL queries (e.g., MongoDB)."
  cwe: "CWE-943"
  severity: "HIGH"
  language_specific:
    javascript:
      ast_sources: ["req.query", "req.body", "req.params"]
      ast_sinks: ["find", "findOne", "findOneAndUpdate", "updateMany", "countDocuments", "aggregate"]
    python:
      ast_sources: ["request.args.get", "request.form.get", "request.json.get", "request.args", "request.json"]
      ast_sinks: ["collection.find", "db.users.find", "collection.insert_one", "collection.update_one"]

COMMAND_INJECTION:
  description: "OS commands built using unvalidated user input."
  cwe: "CWE-78"
  severity: "CRITICAL"
  language_specific:
    java:
      ast_sources: ["request.getParameter"]
      ast_sinks: 
        - name: "exec"
          args: [0]
        - "ProcessBuilder"
        - name: "Runtime.getRuntime().exec"
          args: [0]
    python:
      ast_sources: ["request.args.get", "request.form.get"]
      ast_sinks: 
        - name: "os.system"
          args: [0]
        - name: "os.popen"
          args: [0]
        - name: "subprocess.run"
          args: [0]
        - name: "subprocess.Popen"
          args: [0]
        - name: "subprocess.call"
          args: [0]
        - name: "subprocess.check_output"
          args: [0]
        - name: "eval"
          args: [0]
        - name: "exec"
          args: [0]
    javascript:
      ast_sources: ["req.query", "req.body"]
      ast_sinks: 
        - name: "child_process.exec"
          args: [0]
        - name: "child_process.spawn"
          args: [0]
        - name: "child_process.execSync"
          args: [0]
        - name: "eval"
          args: [0]
    php:
      ast_sources: ["$_GET", "$_POST", "$_REQUEST"]
      ast_sinks:
        - name: "exec"
          args: [0]
        - name: "system"
          args: [0]
        - name: "passthru"
          args: [0]
        - name: "shell_exec"
          args: [0]
        - name: "popen"
          args: [0]
        - name: "eval"
          args: [0]
    ruby:
      ast_sources: ["params", "cookies"]
      ast_sinks: 
        - name: "eval"
          args: [0]
        - name: "system"
          args: [0]
        - name: "exec"
          args: [0]
        - name: "`"
          args: [0]
        - name: "Open3.capture3"
          args: [0]

SELF_COMPARISON:
  description: "Comparing a variable to itself is usually a bug."
  cwe: "CWE-480"
  severity: "LOW"
  language_specific:
    python:
      patterns:
        - pattern: "$X == $X"
        - pattern-not: "1 == 1"
    php:
      patterns:
        - pattern: "$X == $X"
    ruby:
      patterns:
        - pattern: "$X == $X"

LDAP_INJECTION:
  description: "User input used to construct LDAP queries without validation."
  cwe: "CWE-90"
  severity: "HIGH"
  language_specific:
    java:
      ast_sinks: ["search", "lookup"]
    python:
      ast_sinks: ["ldap.search_s", "ldap.search", "ldap3.Connection.search"]
    javascript:
      ast_sinks: ["client.search"]

XPATH_INJECTION:
  description: "User input used to construct XPath queries without validation."
  cwe: "CWE-91"
  severity: "HIGH"
  language_specific:
    java:
      ast_sinks: ["XPath.evaluate"]
    python:
      ast_sinks: ["lxml.etree.XPath", "tree.xpath"]
    javascript:
      ast_sinks: ["xpath.select"]

SSTI:
  description: "Server-Side Template Injection allows attackers to execute code within a template engine."
  cwe: "CWE-94"
  severity: "CRITICAL"
  language_specific:
    python:
      ast_sources: ["request.args.get", "request.form.get", "request.args", "request.form"]
      ast_sinks:
        - name: "render_template_string"
          args: [0]
        - name: "Template"
          args: [0]
        - name: "Mako.template.Template"
          args: [0]
    java:
      ast_sinks: ["evaluate", "process"]
    javascript:
      ast_sources: ["req.query", "req.body"]
      ast_sinks: ["ejs.render", "pug.compile", "handlebars.compile", "mustache.render"]
    php:
      ast_sources: ["$_GET", "$_POST", "$_REQUEST"]
      ast_sinks: ["Twig\\Environment::render", "Smarty::fetch"]
    ruby:
      ast_sources: ["params"]
      ast_sinks: ["ERB.new", "Liquid::Template.parse"]

# --- DATA EXPOSURE & SECRETS ---
HARDCODED_SECRET:
  description: "Hardcoded credentials, API keys, or tokens."
  cwe: "CWE-798"
  severity: "HIGH"
  general_regex_patterns:
    - id: "SEC-AWS-001"
      message: "AWS Access Key ID found."
      pattern: "(?i)AKIA[0-9A-Z]{16}"
    - id: "SEC-AWS-002"
      message: "AWS Secret Access Key found."
      pattern: "(?i)aws_secret_access_key\\s*[=:]\\s*['\"][A-Za-z0-9/+=]{40}['\"]"
    - id: "SEC-GCP-001"
      message: "Google Cloud API Key found."
      pattern: "AIza[0-9A-Za-z-_]{35}"
    - id: "SEC-GH-001"
      message: "GitHub Personal Access Token found."
      pattern: "ghp_[A-Za-z0-9]{36}"
    - id: "SEC-STRIPE-001"
      message: "Stripe API Key found."
      pattern: "sk_live_[0-9a-zA-Z]{24}"
    - id: "SEC-JWT-001"
      message: "Potential JWT Token found."
      pattern: "eyJ[A-Za-z0-9-_=]+\\.eyJ[A-Za-z0-9-_=]+\\.[A-Za-z0-9-_.+/=]*"
    - id: "SEC-PRIVATE-KEY"
      message: "Private Key found."
      pattern: "-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----"
    - id: "SEC-GENERIC-001"
      message: "Generic high-entropy password or secret."
      pattern: "(?i)(password|passwd|pwd|secret|auth|token|api_key|apikey)\\s*[=:]\\s*['\"](.{8,})['\"]"

# --- WEB VULNERABILITIES ---
XSS:
  description: "Unvalidated user input written to HTML response."
  cwe: "CWE-79"
  severity: "HIGH"
  language_specific:
    java:
      ast_sources: ["request.getParameter"]
      ast_sinks: ["print", "println", "write", "sendError", "ModelAndView"]
      ast_sanitizers: ["StringEscapeUtils.escapeHtml4", "HtmlUtils.htmlEscape"]
    javascript:
      ast_sources: ["req.query", "req.body", "document.location", "window.name"]
      ast_sinks: ["innerHTML", "outerHTML", "document.write", "res.send", "res.render", "dangerouslySetInnerHTML"]
      ast_sanitizers: ["dompurify.sanitize", "escapeHtml"]
    php:
      ast_sources: ["$_GET", "$_POST", "$_REQUEST"]
      ast_sinks: ["echo", "print", "printf", "vprintf"]
      ast_sanitizers: ["htmlspecialchars", "htmlentities", "strip_tags"]
    ruby:
      ast_sources: ["params", "cookies"]
      ast_sinks: ["render", "send_data"]
      ast_sanitizers: ["html_escape", "sanitize"]

SSRF:
  description: "Attacker-controlled destination URL for server-side requests."
  cwe: "CWE-918"
  severity: "HIGH"
  language_specific:
    java:
      ast_sources: ["request.getParameter"]
      ast_sinks: ["URL", "HttpGet", "HttpPost", "OkHttpClient.newCall"]
    python:
      ast_sources: ["request.args.get"]
      ast_sinks: ["requests.get", "requests.post", "urllib.request.urlopen", "httpx.get", "aiohttp.ClientSession.get"]
    javascript:
      ast_sources: ["req.query"]
      ast_sinks: ["axios.get", "fetch", "http.get", "request.get"]
    php:
      ast_sources: ["$_GET", "$_POST"]
      ast_sinks: ["file_get_contents", "curl_exec", "fopen"]
    ruby:
      ast_sources: ["params"]
      ast_sinks: ["Net::HTTP.get", "open", "HTTParty.get", "Faraday.get"]

OPEN_REDIRECT:
  description: "Unvalidated user input used in a redirect destination."
  cwe: "CWE-601"
  severity: "MEDIUM"
  language_specific:
    python:
      ast_sources: ["request.args.get", "request.form.get", "request.args", "request.form"]
      ast_sinks: ["redirect", "HttpResponseRedirect", "redirect_to"]
    javascript:
      ast_sources: ["req.query", "req.body"]
      ast_sinks: ["res.redirect", "window.location.replace", "location.href"]
    java:
      ast_sources: ["request.getParameter"]
      ast_sinks: ["sendRedirect", "redirect"]
    php:
      ast_sources: ["$_GET", "$_POST"]
      ast_sinks: ["header"]
    ruby:
      ast_sources: ["params"]
      ast_sinks: ["redirect_to"]

PROTOTYPE_POLLUTION:
  description: "User input used to pollute the prototype of a JavaScript object."
  cwe: "CWE-1321"
  severity: "HIGH"
  language_specific:
    javascript:
      ast_sources: ["req.query", "req.body", "JSON.parse"]
      ast_sinks: ["merge", "extend", "lodash.merge", "lodash.extend", "Object.assign"]

# --- INTEGRITY & DESERIALIZATION ---
INSECURE_DESERIALIZATION:
  description: "Deserializing untrusted data can lead to RCE."
  cwe: "CWE-502"
  severity: "CRITICAL"
  language_specific:
    java:
      ast_sinks: ["readObject", "XMLDecoder.readObject", "ObjectMapper.readValue"]
    python:
      ast_sinks: ["pickle.loads", "yaml.unsafe_load", "jsonpickle.decode", "shelve.open"]

XXE:
  description: "XML External Entity injection can lead to local file disclosure or SSRF."
  cwe: "CWE-611"
  severity: "HIGH"
  language_specific:
    java:
      ast_sources: ["request.getParameter"]
      ast_sinks: ["DocumentBuilder.parse", "SAXParser.parse", "XMLStreamReader.next"]
    python:
      ast_sources: ["request.args.get", "request.form.get", "request.args", "request.form"]
      ast_sinks: ["lxml.etree.fromstring", "xml.dom.minidom.parseString", "xml.etree.ElementTree.fromstring"]

PATH_TRAVERSAL:
  description: "User input used to build a file path without validation."
  cwe: "CWE-22"
  severity: "HIGH"
  language_specific:
    java:
      ast_sources: ["request.getParameter"]
      ast_sinks: ["File", "FileInputStream", "FileOutputStream", "FileReader", "FileWriter"]
    python:
      ast_sources: ["request.args.get"]
      ast_sinks: ["open", "os.path.join", "send_file", "pathlib.Path"]
    javascript:
      ast_sources: ["req.query"]
      ast_sinks: ["fs.readFile", "fs.writeFile", "res.sendFile", "path.join"]

# --- CRYPTOGRAPHY & RANDOMNESS ---
WEAK_CRYPTO:
  description: "Use of outdated or weak cryptographic algorithms."
  cwe: "CWE-327"
  severity: "MEDIUM"
  language_specific:
    java:
      regex_patterns:
        - id: "CRY-MD5-001"
          message: "MD5 is insecure for hashing."
          pattern: "MessageDigest\\.getInstance\\s*\\(\\s*['\"]MD5"
        - id: "CRY-DES-001"
          message: "DES is a weak cipher."
          pattern: "Cipher\\.getInstance\\s*\\(\\s*['\"]DES"
    python:
      regex_patterns:
        - id: "CRY-PY-001"
          message: "MD5 or SHA1 found in hashlib."
          pattern: "hashlib\\.(md5|sha1)\\s*\\("

INSECURE_RANDOM:
  description: "Use of a non-cryptographically secure pseudo-random number generator for sensitive operations."
  cwe: "CWE-338"
  severity: "MEDIUM"
  language_specific:
    python:
      regex_patterns:
        - id: "RND-PY-001"
          message: "Use secrets module instead of random for security-sensitive applications."
          pattern: "import\\s+random"
      ast_sinks: ["random.random", "random.randint", "random.choice"]
    java:
      ast_sinks: ["Math.random", "Random.nextInt"]

# --- CONFIGURATION & HEADERS ---
INSECURE_CONFIG:
  description: "Insecure configuration settings (CORS, Cookies, etc.)."
  cwe: "CWE-16"
  severity: "LOW"
  general_regex_patterns:
    - id: "CFG-CORS-001"
      message: "CORS 'Access-Control-Allow-Origin: *' is too permissive."
      pattern: "Access-Control-Allow-Origin.*\\*"
    - id: "CFG-COOKIE-001"
      message: "Cookie without HttpOnly flag."
      pattern: "Set-Cookie:.*(?!HttpOnly).*"
    - id: "CFG-COOKIE-002"
      message: "Cookie without Secure flag."
      pattern: "Set-Cookie:.*(?!Secure).*"
