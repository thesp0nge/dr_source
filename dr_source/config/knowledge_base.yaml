#
# DRSource Professional Security Knowledge Base
#
# Structure:
# VULNERABILITY_ID:
#   description: "Detailed explanation of the vulnerability"
#   cwe: "Common Weakness Enumeration ID"
#   severity: "HIGH | MEDIUM | LOW | INFO"
#
#   # --- Language-specific rules ---
#   language_specific:
#     <lang>:
#       regex_patterns:
#         - id: "..."
#           message: "..."
#           pattern: "..."
#       ast_sources: ["method1", "variable1"]
#       ast_sinks: 
#         - "method2" # All args are vulnerable
#         - name: "method3"
#           args: [0] # Only the first argument is vulnerable
#       ast_sanitizers: ["cleanupMethod"]
#

# --- INJECTION CATEGORY ---
SQL_INJECTION:
  description: "Building SQL queries with unvalidated user input."
  cwe: "CWE-89"
  severity: "HIGH"
  language_specific:
    java:
      regex_patterns:
        - id: "JAVA-SQLI-001"
          message: "SQL query is directly concatenated with user input (request.getParameter)."
          pattern: "(?i)(SELECT|INSERT|UPDATE|DELETE)\\s+.*\\s+FROM\\s+.*\\+.*request\\.getParameter"
        - id: "JAVA-SQLI-002"
          message: "Insecure 'Statement.execute' call with string concatenation."
          pattern: "(?i)^\\s*Statement\\.execute(Query|Update)?\\s*\\(.*\\+.*\\)"
      ast_sources:
        - "request.getParameter"
        - "request.getHeader"
        - "request.getCookie"
      ast_sinks:
        - name: "executeQuery"
          args: [0]
        - name: "executeUpdate"
          args: [0]
        - name: "execute"
          args: [0]
        - name: "prepareCall"
          args: [0]
      ast_sanitizers:
        - "prepareStatement" # Using prepared statements is a natural sanitizer
        - "setLong"
        - "setInt"
        - "setBoolean"
        - "StringEscapeUtils.escapeSql"
    python:
      ast_sources:
        - "request.args.get"
        - "request.form"
        - "request.json"
        - "request.GET.get"
      ast_sinks:
        - name: "cursor.execute"
          args: [0]
        - name: "session.execute"
          args: [0]
      ast_sanitizers:
        - "int"
        - "float"
        - "bool"
    javascript:
      ast_sources:
        - "req.query"
        - "req.body"
        - "req.params"
      ast_sinks:
        - name: "db.query"
          args: [0]
        - name: "connection.execute"
          args: [0]
        - name: "sequelize.query"
          args: [0]
        - name: "prisma.$queryRaw"
          args: [0]
      ast_sanitizers:
        - "escape"
        - "validator.escape"

COMMAND_INJECTION:
  description: "OS commands built using unvalidated user input."
  cwe: "CWE-78"
  severity: "CRITICAL"
  language_specific:
    java:
      ast_sources: ["request.getParameter"]
      ast_sinks: 
        - name: "exec"
          args: [0]
        - "ProcessBuilder"
    python:
      ast_sources: ["request.args.get", "request.form"]
      ast_sinks: 
        - name: "os.system"
          args: [0]
        - name: "os.popen"
          args: [0]
        - name: "subprocess.run"
          args: [0]
        - name: "subprocess.Popen"
          args: [0]
        - name: "eval"
          args: [0]
        - name: "exec"
          args: [0]
    javascript:
      ast_sources: ["req.query", "req.body"]
      ast_sinks: 
        - name: "child_process.exec"
          args: [0]
        - name: "child_process.spawn"
          args: [0]
        - name: "eval"
          args: [0]

# --- DATA EXPOSURE & SECRETS ---
HARDCODED_SECRET:
  description: "Hardcoded credentials, API keys, or tokens."
  cwe: "CWE-798"
  severity: "HIGH"
  general_regex_patterns:
    - id: "SEC-AWS-001"
      message: "AWS Access Key ID found."
      pattern: "(?i)AKIA[0-9A-Z]{16}"
    - id: "SEC-AWS-002"
      message: "AWS Secret Access Key found."
      pattern: "(?i)aws_secret_access_key\\s*[=:]\\s*['\"][A-Za-z0-9/+=]{40}['\"]"
    - id: "SEC-GH-001"
      message: "GitHub Personal Access Token found."
      pattern: "ghp_[A-Za-z0-9]{36}"
    - id: "SEC-STRIPE-001"
      message: "Stripe API Key found."
      pattern: "sk_live_[0-9a-zA-Z]{24}"
    - id: "SEC-GENERIC-001"
      message: "Generic high-entropy password or secret."
      pattern: "(?i)(password|passwd|pwd|secret|auth|token|api_key|apikey)\\s*[=:]\\s*['\"](.{8,})['\"]"

# --- WEB VULNERABILITIES ---
XSS:
  description: "Unvalidated user input written to HTML response."
  cwe: "CWE-79"
  severity: "HIGH"
  language_specific:
    java:
      ast_sources: ["request.getParameter"]
      ast_sinks: ["print", "println", "write", "sendError"]
      ast_sanitizers: ["StringEscapeUtils.escapeHtml4", "HtmlUtils.htmlEscape"]
    javascript:
      ast_sources: ["req.query", "req.body", "document.location", "window.name"]
      ast_sinks: ["innerHTML", "outerHTML", "document.write", "res.send", "res.render"]
      ast_sanitizers: ["dompurify.sanitize", "escapeHtml"]

SSRF:
  description: "Attacker-controlled destination URL for server-side requests."
  cwe: "CWE-918"
  severity: "HIGH"
  language_specific:
    java:
      ast_sources: ["request.getParameter"]
      ast_sinks: 
        - name: "URL"
          args: [0]
        - name: "HttpGet"
          args: [0]
        - name: "HttpPost"
          args: [0]
    python:
      ast_sources: ["request.args.get"]
      ast_sinks: 
        - name: "requests.get"
          args: [0]
        - name: "requests.post"
          args: [0]
        - name: "urllib.request.urlopen"
          args: [0]
        - name: "httpx.get"
          args: [0]
    javascript:
      ast_sources: ["req.query"]
      ast_sinks: 
        - name: "axios.get"
          args: [0]
        - name: "fetch"
          args: [0]
        - name: "http.get"
          args: [0]

# --- INTEGRITY & DESERIALIZATION ---
INSECURE_DESERIALIZATION:
  description: "Deserializing untrusted data can lead to RCE."
  cwe: "CWE-502"
  severity: "CRITICAL"
  language_specific:
    java:
      ast_sinks: ["readObject", "XMLDecoder.readObject"]
    python:
      ast_sinks: ["pickle.loads", "yaml.unsafe_load", "jsonpickle.decode"]

PATH_TRAVERSAL:
  description: "User input used to build a file path without validation."
  cwe: "CWE-22"
  severity: "HIGH"
  language_specific:
    java:
      ast_sources: ["request.getParameter"]
      ast_sinks: ["File", "FileInputStream", "FileOutputStream", "FileReader", "FileWriter"]
    python:
      ast_sources: ["request.args.get"]
      ast_sinks: 
        - name: "open"
          args: [0]
        - "os.path.join"
        - name: "send_file"
          args: [0]
    javascript:
      ast_sources: ["req.query"]
      ast_sinks: 
        - name: "fs.readFile"
          args: [0]
        - name: "fs.writeFile"
          args: [0]
        - name: "res.sendFile"
          args: [0]

# --- CRYPTOGRAPHY ---
WEAK_CRYPTO:
  description: "Use of outdated or weak cryptographic algorithms."
  cwe: "CWE-327"
  severity: "MEDIUM"
  language_specific:
    java:
      regex_patterns:
        - id: "CRY-MD5-001"
          message: "MD5 is insecure for hashing."
          pattern: "MessageDigest\\.getInstance\\s*\\(\\s*['\"]MD5"
        - id: "CRY-DES-001"
          message: "DES is a weak cipher."
          pattern: "Cipher\\.getInstance\\s*\\(\\s*['\"]DES"
    python:
      regex_patterns:
        - id: "CRY-PY-001"
          message: "MD5 or SHA1 found in hashlib."
          pattern: "hashlib\\.(md5|sha1)\\s*\\("
